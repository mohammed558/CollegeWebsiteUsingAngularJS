<div class="min-h-screen bg-[#f8fafc] py-16 md:py-20 px-4 md:px-6">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16 md:mb-20 animate-fade-up">
            <span class="text-brand-primary font-bold tracking-[0.2em] uppercase text-sm mb-4 block">Get In Touch</span>
            <h1 class="text-5xl md:text-7xl font-extrabold font-display leading-tight text-slate-900 mb-6 px-2">
                Contact <br class="sm:hidden" />
                <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-secondary">Us.</span>
            </h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed px-4">Have questions? We're here to help
                you navigate your academic journey.</p>
        </header>

        <div class="grid lg:grid-cols-3 gap-8 md:gap-10">
            <!-- Contact Info -->
            <div class="space-y-6 order-2 lg:order-1">
                <div class="glass p-8 rounded-[2rem] animate-fade-up" style="animation-delay: 0.1s">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-4">Location</h3>
                    <p class="text-slate-800 font-bold text-sm md:text-base">123 University Avenue,<br />Silicon Valley,
                        CA 94025</p>
                </div>
                <div class="glass p-8 rounded-[2rem] animate-fade-up" style="animation-delay: 0.2s">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-4">Email Us</h3>
                    <p class="text-slate-800 font-bold text-sm md:text-base">
                        admissions@Modern.edu<br />support@Modern.edu</p>
                </div>
                <div class="glass p-8 rounded-[2rem] animate-fade-up" style="animation-delay: 0.3s">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-400 mb-4">Call Us</h3>
                    <p class="text-slate-800 font-bold text-sm md:text-base">+1 (555) 000-1234<br />Mon - Fri, 9am - 5pm
                    </p>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="lg:col-span-2 glass p-8 md:p-16 rounded-[2.5rem] md:rounded-[3rem] animate-fade-up order-1 lg:order-2"
                style="animation-delay: 0.4s">
                <form (submit)="submitForm()" class="space-y-6 md:space-y-8">
                    <div class="grid md:grid-cols-2 gap-6 md:gap-8">
                        <div class="space-y-2">
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 px-1">Full
                                Name</label>
                            <input [(ngModel)]="contactData.name" name="name" type="text" placeholder="John Doe"
                                class="w-full bg-white/50 border-2 border-slate-100 px-6 py-4 rounded-xl md:rounded-2xl focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/5 outline-none transition-all placeholder:text-slate-300 font-medium">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-black uppercase tracking-widest text-slate-400 px-1">Email
                                Address</label>
                            <input [(ngModel)]="contactData.email" name="email" type="email"
                                placeholder="john@example.com"
                                class="w-full bg-white/50 border-2 border-slate-100 px-6 py-4 rounded-xl md:rounded-2xl focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/5 outline-none transition-all placeholder:text-slate-300 font-medium">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label
                            class="block text-xs font-black uppercase tracking-widest text-slate-400 px-1">Subject</label>
                        <input [(ngModel)]="contactData.subject" name="subject" type="text"
                            placeholder="Admission Inquiry"
                            class="w-full bg-white/50 border-2 border-slate-100 px-6 py-4 rounded-xl md:rounded-2xl focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/5 outline-none transition-all placeholder:text-slate-300 font-medium">
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-black uppercase tracking-widest text-slate-400 px-1">Your
                            Message</label>
                        <textarea [(ngModel)]="contactData.message" name="message" rows="5"
                            placeholder="Tell us how we can help..."
                            class="w-full bg-white/50 border-2 border-slate-100 px-6 py-4 rounded-xl md:rounded-2xl focus:border-brand-primary focus:ring-4 focus:ring-brand-primary/5 outline-none transition-all placeholder:text-slate-300 font-medium"></textarea>
                    </div>

                    <button type="submit"
                        class="w-full bg-brand-primary text-white py-4 md:py-5 rounded-xl md:rounded-2xl font-bold text-base md:text-lg hover:bg-black shadow-xl shadow-brand-primary/20 transition-all transform hover:scale-[1.01] active:scale-[0.99]">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

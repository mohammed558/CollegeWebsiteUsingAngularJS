<div class="min-h-screen bg-[#f8fafc] py-16 md:py-20 px-4 md:px-6">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16 md:mb-20 animate-fade-up">
            <span class="text-brand-primary font-bold tracking-[0.2em] uppercase text-sm mb-4 block text-balance">Begin
                Your Journey</span>
            <h1 class="text-5xl md:text-7xl font-extrabold font-display leading-[1.1] text-slate-900 mb-6 px-2">
                Admissions <br class="sm:hidden" />
                <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-secondary">2026.</span>
            </h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed px-4">Join a world-class institution
                where your potential meets our passion for excellence.</p>
        </header>

        <!-- Admission Steps -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8 mb-20 md:mb-32">
            <div *ngFor="let step of steps; let i = index"
                class="glass p-8 md:p-10 rounded-[2rem] md:rounded-[2.5rem] animate-fade-up relative overflow-hidden group"
                [style.animation-delay]="(i * 0.1) + 's'">
                <div
                    class="text-4xl md:text-5xl font-black font-display text-brand-primary/10 mb-6 group-hover:text-brand-primary/20 transition-colors">
                    0{{ i + 1 }}</div>
                <h3 class="text-lg md:text-xl font-bold font-display text-slate-800 mb-4">{{ step.title }}</h3>
                <p class="text-xs md:text-sm text-slate-500 leading-relaxed">{{ step.desc }}</p>
                <div class="absolute bottom-0 right-0 w-16 h-16 bg-brand-primary/5 rounded-tl-[3rem]"></div>
            </div>
        </div>

        <!-- Call to Action -->
        <div
            class="glass p-8 md:p-20 rounded-[2.5rem] md:rounded-[3rem] text-center relative overflow-hidden animate-fade-up">
            <div class="absolute top-0 -left-20 w-80 h-80 bg-brand-primary/10 rounded-full blur-3xl -z-10"></div>
            <div class="relative z-10 w-full">
                <h2 class="text-3xl md:text-5xl font-black font-display text-slate-900 mb-8 leading-tight">Ready to
                    define your future?</h2>
                <div class="flex flex-col sm:flex-row justify-center items-center gap-4 md:gap-6 px-4">
                    <button
                        class="w-full sm:w-auto bg-brand-primary text-white px-8 md:px-12 py-4 md:py-5 rounded-2xl font-bold text-base md:text-lg hover:bg-black shadow-xl shadow-brand-primary/20 transition-all transform hover:scale-[1.03]">
                        Apply Now
                    </button>
                    <button
                        class="w-full sm:w-auto bg-white border-2 border-slate-100 text-slate-700 px-8 md:px-12 py-4 md:py-5 rounded-2xl font-bold text-base md:text-lg hover:border-brand-primary hover:text-brand-primary transition-all">
                        Download Brochure
                    </button>
                </div>
                <p class="mt-8 md:mt-10 text-slate-400 text-[10px] md:text-sm font-medium italic">Application deadline
                    for Fall 2026: August 15, 2026</p>
            </div>
        </div>
    </div>
</div>

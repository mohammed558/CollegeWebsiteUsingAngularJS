<div class="min-h-screen bg-[#f8fafc] py-16 md:py-20 px-4 md:px-6">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16 md:mb-20 animate-fade-up">
            <span class="text-brand-primary font-bold tracking-[0.2em] uppercase text-sm mb-4 block">University
                Life</span>
            <h1 class="text-5xl md:text-7xl font-extrabold font-display leading-tight text-slate-900 mb-6 px-2">
                Upcoming <br class="sm:hidden" />
                <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-brand-primary to-brand-secondary">Events.</span>
            </h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-lg leading-relaxed px-4">Stay updated with the latest
                happenings, summits, and workshops at Modern University.</p>
        </header>

        <div class="space-y-6 md:space-y-8">
            <div *ngFor="let event of events; let i = index"
                class="glass group p-6 md:p-12 rounded-[2rem] md:rounded-[2.5rem] hover:bg-white hover:scale-[1.01] transition-all duration-500 animate-fade-up border-l-4 md:border-l-8 border-l-brand-primary"
                [style.animation-delay]="(i * 0.1) + 's'">

                <div class="flex flex-col md:flex-row md:items-center gap-6 md:gap-8 justify-between">
                    <div class="space-y-4 max-w-3xl">
                        <div class="flex flex-wrap items-center gap-3">
                            <span
                                class="bg-brand-primary/10 text-brand-primary px-3 py-1 rounded-lg text-xs font-bold uppercase tracking-wider">
                                {{ event.date | date:'fullDate' }}
                            </span>
                            <span class="text-slate-400 font-bold text-[10px] md:text-xs uppercase tracking-widest">• {{
                                event.location }}</span>
                        </div>
                        <h3
                            class="text-2xl md:text-3xl font-black font-display text-slate-800 group-hover:text-brand-primary transition-colors">
                            {{ event.title }}</h3>
                        <p class="text-slate-500 leading-relaxed text-base md:text-lg">{{ event.description }}</p>
                    </div>

                    <button
                        class="w-full md:w-auto bg-slate-900 text-white px-8 py-4 rounded-xl md:rounded-2xl font-bold hover:bg-brand-primary hover:shadow-xl hover:shadow-brand-primary/20 transition-all self-start md:self-center whitespace-nowrap">
                        Register Now
                    </button>
                </div>
            </div>

            <div *ngIf="events.length === 0"
                class="text-center py-16 md:py-20 glass rounded-[2rem] md:rounded-[2.5rem]">
                <p class="text-slate-400 font-bold italic">Gathering more innovative events. Check back soon!</p>
            </div>
        </div>
    </div>
</div>

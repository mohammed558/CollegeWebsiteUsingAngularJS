<div class="fixed bottom-8 right-8 z-[60]">
    <!-- Trigger Button -->
    <button (click)="toggleChat()"
        class="btn-gradient p-5 rounded-3xl shadow-2xl transition-all duration-300 transform hover:scale-110 active:scale-90 flex items-center gap-3 group relative overflow-hidden"
        [ngClass]="{'bg-brand-primary text-white': !isOpen, 'bg-slate-900 text-white': isOpen}">
        <div
            class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300">
        </div>
        <span class="relative z-10 text-xl" *ngIf="!isOpen">✨ AI Assistant</span>
        <span class="relative z-10 text-xl font-bold" *ngIf="isOpen">✕</span>
    </button>

    <!-- Chat Window -->
    <div *ngIf="isOpen"
        class="glass fixed bottom-28 right-8 w-[90vw] md:w-96 rounded-[2rem] overflow-hidden flex flex-col animate-fade-up shadow-[0_20px_50px_rgba(30,64,175,0.15)] max-h-[calc(100vh-140px)] border-t-brand-primary border-t-8">

        <!-- Header -->
        <div class="p-6 bg-white/40 flex items-center justify-between border-b border-brand-primary/5">
            <div>
                <h3 class="font-display font-bold text-slate-800 text-lg">University Intelligence</h3>
                <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Online &
                        Adaptive</span>
                </div>
            </div>
            <div
                class="w-10 h-10 bg-brand-primary/10 rounded-xl flex items-center justify-center text-brand-primary font-bold">
                AI</div>
        </div>

        <!-- Messages Area -->
        <div class="chat-window p-6 space-y-4 bg-white/20">
            <div *ngFor="let msg of messages" class="flex flex-col"
                [ngClass]="msg.sender === 'user' ? 'items-end' : 'items-start'">
                <div [ngClass]="msg.sender === 'user' ? 'bg-brand-primary text-white shadow-lg shadow-brand-primary/10 rounded-2xl rounded-tr-none' : 'bg-white text-slate-700 border border-slate-100 shadow-sm rounded-2xl rounded-tl-none'"
                    class="px-4 py-3 text-sm font-medium max-w-[85%] leading-relaxed">
                    {{ msg.text }}
                </div>
                <span class="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-tighter">{{ msg.sender ===
                    'user' ? 'You' : 'Assistant' }}</span>
            </div>

            <!-- Typing Indicator -->
            <div *ngIf="isTyping" class="flex flex-col items-start">
                <div
                    class="bg-white border border-slate-100 shadow-sm rounded-2xl rounded-tl-none px-4 py-3 flex gap-1 items-center h-8">
                    <div class="w-1.5 h-1.5 bg-brand-primary rounded-full animate-bounce" style="animation-delay: 0ms">
                    </div>
                    <div class="w-1.5 h-1.5 bg-brand-primary rounded-full animate-bounce"
                        style="animation-delay: 150ms"></div>
                    <div class="w-1.5 h-1.5 bg-brand-primary rounded-full animate-bounce"
                        style="animation-delay: 300ms"></div>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-5 bg-white/60 border-t border-brand-primary/5">
            <div
                class="flex gap-2 p-1.5 bg-white rounded-2xl border border-slate-200 focus-within:border-brand-primary focus-within:ring-4 focus-within:ring-brand-primary/5 transition-all shadow-sm">
                <input [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="How can I help you?"
                    class="flex-1 bg-transparent border-none px-3 py-2 text-sm text-slate-800 focus:outline-none placeholder:text-slate-400">
                <button (click)="sendMessage()"
                    class="bg-brand-primary text-white p-2 rounded-xl hover:bg-black transition-colors shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>
